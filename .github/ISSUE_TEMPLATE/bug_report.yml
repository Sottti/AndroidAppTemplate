name: Bug report
description: Report a reproducible problem with the template
title: "[Bug]: "
labels:
  - Bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Clone the repository
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Android Studio, JDK, Gradle, device/emulator, and OS details when relevant.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or links that help explain the problem.
    validations:
      required: false
