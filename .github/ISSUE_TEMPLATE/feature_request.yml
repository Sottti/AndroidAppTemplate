name: Feature request
description: Suggest an improvement for the template
title: "[Feature]: "
labels:
  - Enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this solve for apps created from the template?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any simpler or more focused alternatives you considered.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Call out any maintenance, architecture, or migration trade-offs.
    validations:
      required: false
