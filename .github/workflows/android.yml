name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Static Analysis
        run: ./gradlew --no-daemon detekt lintDebug

      - name: Run Unit Tests
        run: ./gradlew --no-daemon test -PexcludeSnapshotTests=true

      - name: Verify Paparazzi Snapshots
        run: ./gradlew --no-daemon verifyPaparazziDebug

      - name: Generate Kover Coverage
        run: ./gradlew --no-daemon koverXmlReport koverVerify -PexcludeSnapshotTests=true

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

      - name: Job Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await core.summary
              .addHeading("Android CI Summary")
              .addList([
                "Static analysis: detekt + lintDebug",
                "Unit tests: test",
                "Snapshot tests: verifyPaparazziDebug",
                "Coverage: koverXmlReport + koverVerify",
                "Build: assembleDebug",
              ])
              .write();
